<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>Polish — AI Proofreader</title>
        <link rel="stylesheet" href="/static/style.css" />
    </head>
    <body>
        <main class="container">
            <header class="header"><h1>Polish</h1><p class="tagline">Grammar, clarity, and style suggestions.</p></header>
            <section class="card">
                <textarea id="text" class="input" placeholder="Paste text to proofread..."></textarea>
                <div class="actions"><button id="runBtn" class="btn primary">Proofread</button><div id="loader" class="spinner hidden"></div></div>
                <div class="result"><h3>Corrected</h3><div id="output">Corrected text will appear here.</div></div>
            </section>
            <footer class="footer">Local demo — pull models manually</footer>
        </main>
        <script src="/static/script.js"></script>
    </body>
</html>
