<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>HelpBot — Customer Support Chat</title>
        <link rel="stylesheet" href="/static/style.css" />
    </head>
    <body>
        <main class="container">
            <header class="header"><h1>HelpBot</h1><p class="tagline">Quick answers for common support questions.</p></header>
            <section class="card">
                <input id="query" class="input" placeholder="Ask a question..." />
                <div class="actions"><button id="runBtn" class="btn primary">Ask</button><div id="loader" class="spinner hidden"></div></div>
                <div class="result"><h3>Reply</h3><div id="response">Replies appear here.</div></div>
            </section>
            <footer class="footer">Local demo — not production ready</footer>
        </main>
        <script src="/static/script.js"></script>
    </body>
</html>
