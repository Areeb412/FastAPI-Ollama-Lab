<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>Orbit — AI Virtual Assistant</title>
        <link rel="stylesheet" href="/static/style.css" />
    </head>
    <body>
        <main class="container">
            <header class="header"><h1>Orbit</h1><p class="tagline">Ask questions or manage quick tasks.</p></header>
            <section class="card">
                <input id="query" class="input" placeholder="Ask something or schedule a task..." />
                <div class="actions"><button id="runBtn" class="btn primary">Send</button><div id="loader" class="spinner hidden"></div></div>
                <div class="result"><h3>Assistant</h3><div id="response">Responses appear here.</div></div>
            </section>
            <footer class="footer">Local demo — not production ready</footer>
        </main>
        <script src="/static/script.js"></script>
    </body>
</html>
