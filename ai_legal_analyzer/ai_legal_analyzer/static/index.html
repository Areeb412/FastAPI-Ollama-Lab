<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>Lexa — AI Legal Analyzer</title>
        <link rel="stylesheet" href="/static/style.css" />
    </head>
    <body>
        <main class="container">
            <header class="header"><h1>Lexa</h1><p class="tagline">Summarize contracts and highlight key clauses.</p></header>
            <section class="card">
                <textarea id="text" class="input" placeholder="Paste contract or clause text..."></textarea>
                <div class="actions"><button id="runBtn" class="btn primary">Analyze</button><div id="loader" class="spinner hidden"></div></div>
                <div class="result"><h3>Insights</h3><div id="output">Your insights will appear here.</div></div>
            </section>
            <footer class="footer">Educational demo — not legal advice</footer>
        </main>
        <script src="/static/script.js"></script>
    </body>
</html>
