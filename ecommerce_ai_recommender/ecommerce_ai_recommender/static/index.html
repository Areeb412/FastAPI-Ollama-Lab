<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>Reco — AI Recommender</title>
        <link rel="stylesheet" href="/static/style.css" />
    </head>
    <body>
        <main class="container">
            <header class="header"><h1>Reco</h1><p class="tagline">Personalized product recommendations.</p></header>
            <section class="card">
                <textarea id="prefs" class="input" placeholder="Describe preferences, budget, and use case..."></textarea>
                <div class="actions"><button id="runBtn" class="btn primary">Recommend</button><div id="loader" class="spinner hidden"></div></div>
                <div class="result"><h3>Recommendations</h3><div id="response">Recommendations will appear here.</div></div>
            </section>
            <footer class="footer">Local demo — suggestions only</footer>
        </main>
        <script src="/static/script.js"></script>
    </body>
</html>
